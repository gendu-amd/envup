# ============================================
# tmux Configuration  (managed by envup — symlinked to ~/.tmux.conf)
# ============================================

# ---------------------------
# General Settings
# ---------------------------
# Change prefix from Ctrl+b to Ctrl+a (easier to reach)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Enable mouse support
set -g mouse on

# Use zsh for new panes/windows when it's installed, regardless of the system
# login shell (so tmux matches your interactive shell even on machines where
# chsh couldn't change the default). Falls back to the login shell otherwise.
if-shell 'command -v zsh >/dev/null 2>&1' 'set -g default-command zsh'

# Set default terminal
set -g default-terminal "screen-256color"

# Enable true color
set -ga terminal-overrides ",*256col*:Tc"

# Increase history limit
set -g history-limit 10000

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# ---------------------------
# Status Bar
# ---------------------------
# Enable status bar
set -g status on
set -g status-position bottom

# Status bar colors
set -g status-style 'bg=#282c34 fg=#abb2bf'

# Left side: [session] window-list
set -g status-left-length 40
set -g status-left '#[fg=#61afef,bold][#S] '

# Right side: Host, Time
set -g status-right-length 100
set -g status-right '#[fg=#e5c07b]#{host} #[fg=#98c379]%H:%M #[fg=#61afef]%Y-%m-%d'

# Window status format
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format '#[fg=#282c34,bg=#61afef,bold] #I:#W '

# ---------------------------
# Key Bindings
# ---------------------------
# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Swap windows left/right (< > mirrors default { } for panes)
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# ---------------------------
# Copy Mode (Vi style)
# ---------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ---------------------------
# Plugins (TPM)
# ---------------------------
# Plugin directories live in ~/.tmux/plugins/ (managed by envup as symlinks
# into modules/tmux/files/plugins/, themselves git submodules of this repo).
#
# Once loaded:
#   prefix + I        install/update plugins   (auto-run on first source)
#   prefix + Ctrl-s   manual save  (tmux-resurrect)
#   prefix + Ctrl-r   manual restore
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'

# tmux-resurrect: also capture each pane's visible content + restore nvim sessions
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# tmux-continuum: auto-save every 15min + auto-restore on tmux server start
# Save dir defaults to ~/.local/share/tmux/resurrect (persistent, NOT /tmp).
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

# Initialize TPM (must be the last plugin-related line; loads everything
# declared above and applies each plugin's defaults).
run '~/.tmux/plugins/tpm/tpm'

# ---------------------------
# Per-machine overrides
# ---------------------------
# Sourced AFTER TPM so it can override any plugin's defaults (e.g. mouse mode,
# status bar colors, key bindings for this host only).
#
# This file is NOT in the envup repo — create it locally per machine:
#   echo 'set -g status-style "bg=#1e1e2e fg=#cdd6f4"' >> ~/.tmux.local
#   tmux source ~/.tmux.conf
if-shell '[ -f ~/.tmux.local ]' 'source-file ~/.tmux.local'


