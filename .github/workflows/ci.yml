name: CI

on:
  push:
    branches: [main, refactor]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (shellcheck + bash -n)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint shell sources
        run: bash scripts/lint.sh

  unit:
    name: unit (bats)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats
      - name: Run unit tests
        run: bats tests/unit

  integration:
    name: integration (dry-run + cli)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats + jq
        run: sudo apt-get update && sudo apt-get install -y bats jq
      - name: Run integration tests
        run: bats tests/integration

  smoke-host:
    name: smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # macOS ships bash 3.2; envup re-execs into Homebrew bash (>= 4). Install
      # it so that path is exercised in CI.
      - name: Install bash >= 4 (macOS)
        if: runner.os == 'macOS'
        run: brew install bash
      - name: Smoke — git install -> status -> uninstall
        run: bash tests/integration/smoke.sh

  smoke-containers:
    name: smoke (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [fedora:latest, archlinux:latest, alpine:latest]
    steps:
      - uses: actions/checkout@v4
      # Run the smoke test inside each distro via docker (checkout stays on the
      # host, so we avoid node-in-container issues). Each distro installs bash +
      # git with its own package manager, then runs the smoke script.
      - name: Smoke in ${{ matrix.image }}
        run: |
          docker run --rm -v "$PWD:/src" -w /src "${{ matrix.image }}" sh -c '
            set -e
            if command -v dnf >/dev/null 2>&1; then dnf install -y git bash >/dev/null;
            elif command -v pacman >/dev/null 2>&1; then pacman -Sy --noconfirm git bash >/dev/null;
            elif command -v apk >/dev/null 2>&1; then apk add --no-cache git bash >/dev/null;
            fi
            bash tests/integration/smoke.sh
          '
